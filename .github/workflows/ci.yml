name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    name: Lint + Type + Test (base)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync (dev + test)
        run: uv sync --extra dev --extra test

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest (no spark)
        run: uv run pytest -m "not spark" --cov=cql_sdk --cov-report=xml

      - name: Build distributions
        run: uv build

      - name: Validate base wheel is Spark-free
        run: |
          python -m venv .clean
          .clean/bin/pip install --upgrade pip
          .clean/bin/pip install dist/*.whl
          .clean/bin/python -c "import cql_sdk, cql_sdk.cli.main; print(cql_sdk.__version__)"
          if .clean/bin/python -c "import pyspark" 2>/dev/null; then
            echo "ERROR: pyspark is importable from the base install." >&2
            exit 1
          fi

  spark:
    name: Spark extra tests
    runs-on: ubuntu-latest
    needs: lint-type-test
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-spark')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --extra dev --extra test --extra spark
      - run: uv run pytest -m spark
